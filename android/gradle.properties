# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# AndroidX package structure
android.useAndroidX=true

# Use this property to specify which architecture you want to build.
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# Must match MainApplication / Hermes — without this, Gradle can bundle JSC while runtime expects Hermes.
hermesEnabled=true

newArchEnabled=true

# Use this property to enable edge-to-edge display support.
edgeToEdgeEnabled=false

# Add the package name directly to gradle properties as a fallback
android.package.name=com.summitstaffing.app
